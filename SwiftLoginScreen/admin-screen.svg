  <rect x="40" y="192" width="230" height="34" rx="6" fill="#fafafa" stroke="#c9c9cf"/>
  <text x="52" y="214" font-family="Menlo, Monaco, monospace" font-size="12" fill="#85858c">venueName</text>
  <rect x="282" y="192" width="80" height="34" rx="6" fill="#e9eaee" stroke="#c9c9cf"/>
  <text x="322" y="214" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#1f1f1f">Select</text>

