<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">SwiftCinemas Admin Screen Mock</title>
  <desc id="desc">Vector mock of the AdminVC screen with top Back and Update buttons, form fields, and bottom Save button.</desc>

  <rect x="0" y="0" width="390" height="844" fill="#f7f7f8"/>
  <rect x="16" y="12" width="358" height="820" rx="24" fill="#ffffff" stroke="#d8d8dc"/>

